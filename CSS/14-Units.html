<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS units</title>
    <style>
        #parent{
            background-color: antiquewhite;
            width: 40%;
            font-size: 30px;
        }
        h1{
            font-size: 1rem;
        }
        h2{
            font-size: 2em;
        }
        h3{
            font-size: 1.5em;
        }
        
    </style>
</head>
<body>
<div id="parent">
    <h1>Today is GURU Bar</h1>
    <h2>Yesterday was BUDHU bar</h2>
    <h3>Tomorrow will be SUKRA bar</h3>
    </div>
</body>
</html>
