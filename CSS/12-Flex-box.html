<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex-Box</title>
    <style>
        .container{
            height: 80vh;
            border:2px solid pink;
            display:flex;
           
            justify-content: center;
            align-items: center;
           /* justify-content: space-around; */
            /* - there is half space between 1st element box and in between 1st and 2nd box there is it's double space. */
           /* justify-content: space-between; */
           /* -there is the only distance between item to item */
           /* justify-content: space-evenly; */
           /* - evenly distributed all the space */
           flex-wrap: wrap;

        }
        .item{
            height:90px;
            width: 90px;
            border:2px solid black;
            color:aqua;
            background-color:salmon ;
            font-size: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            
        }
    </style>
</head>
<body>
    
    <main>
        <div class="container">  
            <div class="item">1</div>
            <div class="item">2</div>
            <div class="item">3</div>
            <div class="item">4</div>
            <div class="item">5</div>
            <div class="item">6</div>
            <div class="item">7</div>
            <div class="item">8</div>
            <div class="item">1</div>
            <div class="item">2</div>
            <div class="item">3</div>
            <div class="item">4</div>
            <div class="item">5</div>
            <div class="item">6</div>
            <div class="item">7</div>
            <div class="item">8</div>
            <div class="item">1</div>
            <div class="item">2</div>
            <div class="item">3</div>
            <div class="item">4</div>
            <div class="item">5</div>
            <div class="item">6</div>
            <div class="item">7</div>
            <div class="item">8</div>
            
            
        </div>
    </main>
</body>
</html>
