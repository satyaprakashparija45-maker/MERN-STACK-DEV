<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class selector</title>
    <style>
        h1{
            color:antiquewhite;
            background-color: chocolate;
        }
        .demo{
            color:palevioletred;
            background-color: skyblue;
        }
        .nit{
            color:paleturquoise;
            background-color: blue;
        }
    </style>
</head>
<body>
    <h1>Today is rainy day</h1>
    <h1 class="demo">Today is rainy day</h1>
    <h1>Today is rainy day</h1>
    <h1 class="nit">Today is rainy day</h1>
    

    
    

    
</body>
</html>
