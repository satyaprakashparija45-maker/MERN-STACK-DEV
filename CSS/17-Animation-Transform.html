<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transformer property</title>
    <style>
        div{
            height: 500px;
            width: 500px;
            background-color: aqua;
            border: 2px solid black;
            margin: 100px;
            transition: all 5s ease-in;
            border-radius: 100%;
            padding:100px;
            color:white

        }

        div:hover{
            background-color: red;
            color: white;
            font-size: 20px;
            font-family:  sans-serif;
            /* transform: rotate(360deg); */
            /* transform: rotateZ(45deg); */
            /* transform: scaleZ(2); */
            /* transform: skewX(20000deg); */
        }
        .a{
            height: 1px;
            width:1px;
            margin-right:20px;
            padding:30px;
        }
        .b{
            height: 1px;
            width: 1px;
            margin-left: 80px;
            padding: 90px;
        }
        .c{
            height: 1px;
            width: 1px;
            margin-bottom:50px;
            padding:90px;
        }
    </style>
</head>
<body>
    <div>
        <div class="a"></div>
        <div class="b"></div>
        <div class="c"></div>
    </div>
    
</body>
</html>
